<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NyandSign — Camera Setup</title>
<style>
:root {
    --color-bg: #1a1a2e;
    --color-card: #16213e;
    --color-text: #e0e0e0;
    --color-muted: #a0a0b0;
    --color-primary: #4fc3f7;
    --color-success: #66bb6a;
    --color-error: #ef5350;
    --color-border: #2a2a4a;
}
@media (prefers-color-scheme: light) {
    :root {
        --color-bg: #f5f5f5;
        --color-card: #ffffff;
        --color-text: #333;
        --color-muted: #666;
        --color-primary: #1976d2;
        --color-success: #388e3c;
        --color-error: #d32f2f;
        --color-border: #ddd;
    }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
}
.card {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
}
.icon { font-size: 64px; margin-bottom: 16px; }
h1 { font-size: 1.5rem; margin-bottom: 8px; }
.description {
    color: var(--color-muted);
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 32px;
}
.btn {
    display: inline-block;
    padding: 14px 36px;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    color: #fff;
    background: var(--color-primary);
}
.btn:hover { opacity: 0.85; }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.status {
    margin-top: 24px;
    padding: 16px;
    border-radius: 8px;
    font-size: 0.95rem;
    line-height: 1.5;
    display: none;
}
.status.success {
    display: block;
    background: color-mix(in srgb, var(--color-success) 15%, transparent);
    color: var(--color-success);
}
.status.error {
    display: block;
    background: color-mix(in srgb, var(--color-error) 15%, transparent);
    color: var(--color-error);
}
</style>
</head>
<body>
<div class="card">
    <div class="icon">📷</div>
    <h1 data-i18n="setupTitle">Camera Setup</h1>
    <p class="description" data-i18n="setupDescription">
        NyandSign needs camera access to detect hand signs.
        Press the button below and select "Allow every time" to enable camera access.
    </p>
    <button class="btn" id="btn-allow" data-i18n="setupBtnAllow">📷 Allow Camera</button>
    <div class="status" id="status"></div>
</div>
<script src="camera-setup.js"></script>
</body>
</html>
