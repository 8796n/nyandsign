<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NyandSign PiP</title>
<style>
    :root {
        --bg: #1a1a2e;
        --text: #e0e0e0;
        --accent: #4cc9f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, sans-serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    #camera-video { position: fixed; top: -9999px; width: 1px; height: 1px; }
    #hand-canvas { position: fixed; top: -9999px; width: 1px; height: 1px; }
    #pip-video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

    /* カメラプレビュー（PiP 開始前に表示） */
    #preview-container {
        position: relative;
        width: 100%;
        height: 100%;
    }
    #preview-canvas {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
    }

    /* PiP 開始ボタン（プレビュー中央） */
    #btn-start-pip {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 10px 24px;
        border: none;
        border-radius: 20px;
        background: var(--accent);
        color: #000;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        opacity: 0.9;
        z-index: 10;
    }
    #btn-start-pip:hover { opacity: 1; }
    #btn-start-pip:disabled { opacity: 0.4; cursor: default; }

    /* ステータス表示 */
    #status {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 13px;
        background: rgba(0,0,0,0.6);
        padding: 4px 12px;
        border-radius: 12px;
        z-index: 10;
        white-space: nowrap;
    }

    /* PiP アクティブ時のメッセージ */
    #pip-active-msg {
        display: none;
        text-align: center;
        padding: 20px;
    }
    #pip-active-msg h3 { margin-bottom: 8px; }
    #pip-active-msg p { font-size: 13px; opacity: 0.7; }

    /* サイドパネルに戻るボタン */
    #btn-back {
        position: absolute;
        top: 8px;
        right: 8px;
        padding: 4px 10px;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        background: rgba(255,255,255,0.1);
        color: var(--text);
        font-size: 11px;
        cursor: pointer;
        z-index: 10;
        opacity: 0.7;
    }
    #btn-back:hover { opacity: 1; background: rgba(255,255,255,0.2); }

    /* ターゲットタブ表示バー */
    #target-tab-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        background: rgba(0,0,0,0.7);
        font-size: 11px;
        z-index: 10;
        white-space: nowrap;
        overflow: hidden;
    }
    #target-tab-bar .target-icon { flex-shrink: 0; }
    #target-tab-bar .target-favicon {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        border-radius: 2px;
    }
    #target-tab-bar .target-title {
        overflow: hidden;
        text-overflow: ellipsis;
        opacity: 0.85;
    }
    #target-tab-bar.target-lost {
        background: rgba(180, 40, 40, 0.85);
    }
</style>
</head>
<body>

<!-- カメラ（非表示） -->
<video id="camera-video" autoplay playsinline muted></video>
<canvas id="hand-canvas"></canvas>

<!-- PiP 用ビデオ（非表示） -->
<video id="pip-video" muted playsinline></video>

<!-- カメラプレビュー（PiP 開始前） -->
<div id="preview-container">
    <span id="status" data-i18n="pipStatusPreparing">Preparing...</span>
    <canvas id="preview-canvas"></canvas>
    <button id="btn-start-pip" disabled data-i18n="pipBtnStartPip">📌 Start PiP Mode</button>
    <!-- ターゲットタブ情報バー -->
    <div id="target-tab-bar">
        <span class="target-icon">🎯</span>
        <img class="target-favicon" id="target-favicon" src="" alt="">
        <span class="target-title" id="target-title">—</span>
    </div>
</div>

<!-- PiP アクティブ時 -->
<div id="pip-active-msg">
    <h3 data-i18n="pipActiveTitle">📌 PiP Mode Active</h3>
    <p data-i18n="pipActiveHint">You can minimize this window.<br>Close PiP to return to preview.</p>
</div>

<!-- 共通: サイドパネルに戻るボタン -->
<button id="btn-back" data-i18n="pipBtnBack" data-i18n-title="pipBtnBackTitle">↩ Back to Side Panel</button>

<script src="hand-tracker.js"></script>
<script src="pip.js"></script>

</body>
</html>
